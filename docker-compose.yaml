version: '3.1'

services:

  postgresql:
    image: postgres:15
    container_name: postgresql
    environment:
      POSTGRES_DB: mitsuru_home
      POSTGRES_USER: mitsuru
      POSTGRES_PASSWORD: nachan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  java-admin-service:
    build:
      context: ./admin
    container_name: java-admin-service
    ports:
      - "8080:8080"
    environment:
      spring.datasource.url:jdbc: postgresql://postgresql:5432/mitsuru_home
      spring.datasource.username: mitsuru
      spring.datasource.password: nachan
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgresql
      - rabbitmq

  go-email-service:
    build:
      context: ./go-email-service
    container_name: go-email-service
    environment:
      MQ_SERVER: amqp://guest:guest@rabbitmq:5672/
      ORDER_QUEUE: order.queue
    depends_on:
      rabbitmq:
        condition: service_healthy
volumes:
  postgres_data: #use volumes to persist data outside container lifecycle

